<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>商家管理后台</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding-bottom: 20px; }
    .admin-header { background:var(--primary-gradient); padding:15px 20px; color:white; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:60; }
    .admin-header h1 { font-size:20px; font-weight:bold; }
    .admin-header a { color:white; text-decoration:none; font-size:14px; background:rgba(255,255,255,0.2); padding:8px 16px; border-radius:20px; }
    .admin-header a:active { background:rgba(255,255,255,0.35); }
    .admin-tabs { display:flex; background:white; border-bottom:2px solid var(--border-color); position:sticky; top:60px; z-index:50; }
    .admin-tab { flex:1; text-align:center; padding:14px 0; font-size:15px; font-weight:bold; color:var(--text-muted); cursor:pointer; border-bottom:3px solid transparent; transition:all 0.2s; }
    .admin-tab.active { color:var(--primary); border-bottom-color:var(--primary); }
    .admin-tab:active { transform:scale(0.95); }
    .new-order-badge { background:#FF5252; color:white; font-size:11px; min-width:18px; height:18px; border-radius:9px; display:inline-flex; align-items:center; justify-content:center; padding:0 5px; font-weight:bold; margin-left:4px; vertical-align:middle; }
    .order-status-badge { display:inline-block; padding:4px 12px; border-radius:20px; font-size:13px; font-weight:bold; }
    .status-pending { background:#FFF3E0; color:#FF9800; }
    .status-making { background:#E3F2FD; color:#2196F3; }
    .status-done { background:#E8F5E9; color:#4CAF50; }
    .status-btns { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
    .status-btn { padding:10px 18px; border-radius:20px; border:none; font-size:13px; font-weight:bold; cursor:pointer; transition:transform 0.15s; }
    .status-btn:active { transform:scale(0.95); }
    .btn-accept { background:#4CAF50; color:white; }
    .btn-making { background:#2196F3; color:white; }
    .btn-done-status { background:var(--primary); color:white; }
    .btn-reject { background:#FF5252; color:white; }
    .auto-refresh-bar { background:#f0f0f0; padding:8px 15px; font-size:13px; color:var(--text-secondary); display:flex; justify-content:space-between; align-items:center; }
    .refresh-dot { width:8px; height:8px; border-radius:50%; background:#4CAF50; display:inline-block; margin-right:6px; animation:blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .order-section-title { padding:12px 15px 6px; font-size:16px; font-weight:bold; }
    .order-card.has-new { animation:pulse 1s ease; }
    @keyframes pulse { 0%,100%{box-shadow:0 1px 6px rgba(0,0,0,0.06)} 50%{box-shadow:0 0 20px rgba(222,170,211,0.5)} }
  </style>
</head>
<body>
  <div class="admin-header">
    <h1>🏠 商家管理后台</h1>
    <a href="index.html">← 返回前台</a>
  </div>

  <div class="admin-tabs">
    <div class="admin-tab active" onclick="switchAdmin('orders')">📋 订单管理<span id="pending-count"></span></div>
    <div class="admin-tab" onclick="switchAdmin('foods')">🍽️ 菜品管理</div>
  </div>

  <div id="admin-content"></div>

  <script>
    const SUPABASE_URL = 'https://yjclkfzidxoawbpkrtus.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlqY2xrZnppZHhvYXdicGtydHVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MTIzOTEsImV4cCI6MjA5NjI4ODM5MX0.eWKqdNbLxSJkQK0KKSp8p1OX3Ybsz1mmAv0DYiER9oo';

    const Toast={_el:null,_timer:null,show(msg,t=2000){if(!this._el){this._el=document.createElement('div');this._el.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.75);color:white;padding:12px 24px;border-radius:8px;font-size:14px;z-index:9999;pointer-events:none;opacity:0;transition:opacity 0.3s;';document.body.appendChild(this._el)}clearTimeout(this._timer);this._el.textContent=msg;this._el.style.opacity='1';this._timer=setTimeout(()=>{this._el.style.opacity='0'},t)}};
    function showConfirm(msg){return new Promise(r=>{const m=document.createElement('div');m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:flex;align-items:center;justify-content:center;';m.innerHTML='<div style="background:white;border-radius:16px;padding:24px;width:80%;max-width:300px;text-align:center;"><div style="font-size:40px;">🤔</div><div style="font-size:17px;color:#333;margin:12px 0 20px;">'+msg+'</div><div style="display:flex;gap:12px;"><button id="no" style="flex:1;padding:12px;border-radius:10px;border:none;background:#f5f5f5;color:#666;">取消</button><button id="yes" style="flex:1;padding:12px;border-radius:10px;border:none;background:#DEAAD3;color:white;">确认</button></div></div>';document.body.appendChild(m);m.querySelector('#no').onclick=()=>{m.remove();r(false)};m.querySelector('#yes').onclick=()=>{m.remove();r(true)}})}

    async function api(p,o={}){const h={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};if(o.body){h['Content-Type']='application/json';o.body=JSON.stringify(o.body)}const r=await fetch(SUPABASE_URL+'/rest/v1/'+p,{...o,headers:h});if(r.status===204)return null;if(!r.ok){const e=await r.text();console.error(e);throw new Error(e)}return r.json()}

    async function uploadImage(file){const safeName=Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');const res=await fetch(SUPABASE_URL+'/storage/v1/object/food-images/'+safeName,{method:'POST',headers:{'Authorization':'Bearer '+SUPABASE_KEY},body:file});if(!res.ok)return'';return SUPABASE_URL+'/storage/v1/object/public/food-images/'+safeName}

    const CATS=['注意‼️','小狗券','小狗心情','小狗口味','小狗主厨','小狗美食','小狗甜品','小狗运动','小狗饮料'];
    let adminPage='orders',foods=[],orders=[],refreshTimer=null;

    async function init(){await loadFoods();await loadOrders();renderAdminOrders();startAutoRefresh()}

    async function loadFoods(){try{const d=await api('foods?select=*&order=id');const g=[[],[],[],[],[],[],[],[],[]];d.forEach(f=>{const c=f.category_index||0;if(!g[c])g[c]=[];g[c].push({id:f.id,name:f.name,emoji:f.emoji,price:f.price,catIdx:f.category_index,img:f.image_url,fav:false})});foods=g}catch(e){Toast.show('加载菜品失败')}}

    async function loadOrders(){try{const d=await api('orders?select=*&order=created_at.desc');orders=d.map(o=>({id:o.id,time:new Date(o.created_at).toLocaleString('zh-CN'),items:o.items,total:o.total_price,status:o.status}));updatePendingBadge()}catch(e){orders=[]}}

    function updatePendingBadge(){const pc=orders.filter(o=>o.status==='待接单').length;const el=document.getElementById('pending-count');if(el)el.innerHTML=pc>0?'<span class="new-order-badge">'+pc+'</span>':'';}

    function startAutoRefresh(){refreshTimer=setInterval(async()=>{const oldPending=orders.filter(o=>o.status==='待接单').length;await loadOrders();const newPending=orders.filter(o=>o.status==='待接单').length;if(newPending>oldPending){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const osc=ctx.createOscillator();const gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.frequency.value=800;gain.gain.value=0.3;osc.start();osc.stop(ctx.currentTime+0.5);}catch(e){}Toast.show('🔔 新订单来了！',3000);}if(adminPage==='orders')renderAdminOrders();},10000);}

    function switchAdmin(p){adminPage=p;document.querySelectorAll('.admin-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&p==='orders')||(i===1&&p==='foods')));if(p==='orders')renderAdminOrders();else renderAdminFoods();}

    function renderAdminOrders(){
      const pending=orders.filter(o=>o.status==='待接单');
      const making=orders.filter(o=>o.status==='制作中');
      const done=orders.filter(o=>o.status==='已完成');
      let h='<div class="auto-refresh-bar"><span><span class="refresh-dot"></span>自动刷新中（每10秒）</span><span>共'+orders.length+'单</span></div>';
      if(pending.length){h+='<div class="order-section-title" style="color:#FF9800;">🔔 待接单 ('+pending.length+')</div>';pending.forEach(o=>{h+=renderOrderCard(o)});}
      if(making.length){h+='<div class="order-section-title" style="color:#2196F3;">👨‍🍳 制作中 ('+making.length+')</div>';making.forEach(o=>{h+=renderOrderCard(o)});}
      if(done.length){h+='<div class="order-section-title" style="color:#4CAF50;">✅ 已完成 ('+done.length+')</div>';done.forEach(o=>{h+=renderOrderCard(o)});}
      if(!orders.length)h+='<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">暂无订单</div></div>';
      document.getElementById('admin-content').innerHTML=h;
    }

    function renderOrderCard(o){
      const sc=o.status==='待接单'?'status-pending':o.status==='制作中'?'status-making':'status-done';
      let btns='';
      if(o.status==='待接单')btns='<button class="status-btn btn-accept" onclick="updateOrder('+o.id+',\'制作中\')">✅ 接单制作</button><button class="status-btn btn-reject" onclick="deleteOrder('+o.id+')">❌ 拒绝</button>';
      else if(o.status==='制作中')btns='<button class="status-btn btn-done-status" onclick="updateOrder('+o.id+',\'已完成\')">✅ 制作完成</button>';
      let h='<div class="order-card'+(o.status==='待接单'?' has-new':'')+'"><div class="order-header"><span style="font-size:14px;color:var(--text-secondary)">订单 #'+o.id+'</span><span class="order-status-badge '+sc+'">'+o.status+'</span></div><div class="order-time">'+o.time+'</div><div class="order-items">';
      o.items.forEach(it=>{h+='<div class="order-item"><span>'+it.emoji+'</span><span style="flex:1">'+it.name+'</span><span style="color:var(--text-muted)">x'+it.count+'</span></div>';});
      h+='</div><div class="order-footer"><span>合计：</span><span style="font-size:20px;color:var(--primary);font-weight:bold">¥'+Number(o.total).toFixed(2)+'</span></div>';
      if(btns)h+='<div class="status-btns">'+btns+'</div>';
      h+='</div>';
      return h;
    }

    async function updateOrder(id,status){try{await api('orders?id=eq.'+id,{method:'PATCH',body:{status}});Toast.show(status==='制作中'?'已接单 👨‍🍳':'已完成 ✅');await loadOrders();renderAdminOrders()}catch(e){Toast.show('操作失败')}}

    async function deleteOrder(id){if(!await showConfirm('确定拒绝此订单？'))return;try{await api('orders?id=eq.'+id,{method:'DELETE'});Toast.show('已拒绝');await loadOrders();renderAdminOrders()}catch(e){Toast.show('操作失败')}}

    function renderAdminFoods(){
      const all=foods.flat();
      let h='<div class="add-section"><div class="section-title">添加新菜品</div><div class="form-item"><span class="form-label">菜品名称</span><input class="form-input" id="new-name" placeholder="输入菜品名称"/></div><div class="form-item"><span class="form-label">价格 (¥)</span><input class="form-input" id="new-price" type="number" placeholder="输入价格" step="0.01"/></div><div class="form-item"><span class="form-label">Emoji图标</span><input class="form-input" id="new-emoji" placeholder="如 🍜" value="🍽️"/></div><div class="form-item"><span class="form-label">所属分类</span><select class="picker-value" id="new-cat">';
      CATS.forEach((c,i)=>{h+='<option value="'+i+'">'+c+'</option>'});
      h+='</select></div><div class="form-item"><span class="form-label">菜品图片</span><input type="file" id="new-img" accept="image/*" style="display:block;margin-top:5px;"/></div><button class="btn-add" onclick="addFood()">➕ 添加菜品</button></div><div class="list-section"><div class="section-title">当前菜品 (共'+all.length+'道)</div><div class="food-list">';
      all.forEach(f=>{h+='<div class="food-item-manage"><div class="food-left"><div class="food-img-wrapper">'+(f.img?'<img src="'+f.img+'"/>':'<div class="food-emoji-manage">'+f.emoji+'</div>')+'</div><div class="food-info-manage"><div class="food-name-manage">'+f.name+'</div><div class="food-cat-manage">'+CATS[f.catIdx]+'</div><div class="food-price-manage">¥'+Number(f.price).toFixed(2)+'</div></div></div><div class="food-actions-manage"><button class="btn-edit" onclick="editFood('+f.id+')">✏️</button><button class="btn-delete" onclick="deleteFood('+f.id+')">🗑️</button></div></div>'});
      h+='</div></div>';
      document.getElementById('admin-content').innerHTML=h;
    }

    async function addFood(){
      const n=document.getElementById('new-name').value.trim(),p=parseFloat(document.getElementById('new-price').value)||0,e=document.getElementById('new-emoji').value.trim()||'🍽️',c=parseInt(document.getElementById('new-cat').value);
      if(!n){Toast.show('请输入名称');return}
      const imgFile=document.getElementById('new-img').files[0];
      let imgUrl='';
      if(imgFile){imgUrl=await uploadImage(imgFile);if(!imgUrl){Toast.show('图片上传失败，请用英文文件名');return}}
      try{
        const res=await fetch(SUPABASE_URL+'/rest/v1/foods',{method:'POST',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({name:n,price:p,emoji:e,category_index:c,image_url:imgUrl})});
        if(!res.ok){const e=await res.text();console.error(e);Toast.show('添加失败');return}
        Toast.show('添加成功！✅');await loadFoods();renderAdminFoods();
      }catch(err){console.error(err);Toast.show('添加失败')}
    }

    async function deleteFood(id){if(!await showConfirm('删除此菜品？'))return;await api('favorites?food_id=eq.'+id,{method:'DELETE'});await api('foods?id=eq.'+id,{method:'DELETE'});Toast.show('已删除');await loadFoods();renderAdminFoods()}

    let editId=null;
    function editFood(id){
      const f=foods.flat().find(x=>x.id===id);if(!f)return;editId=id;
      let o='';CATS.forEach((c,i)=>{o+='<option value="'+i+'"'+(i===f.catIdx?' selected':'')+'>'+c+'</option>'});
      document.body.insertAdjacentHTML('beforeend','<div id="edit-modal"><div class="modal-mask" onclick="closeEdit()"></div><div class="modal-content"><div class="modal-title">编辑菜品</div><div class="form-item"><span class="form-label">菜品名称</span><input class="form-input" id="edit-name" value="'+f.name+'"/></div><div class="form-item"><span class="form-label">价格</span><input class="form-input" id="edit-price" type="number" value="'+f.price+'"/></div><div class="form-item"><span class="form-label">Emoji</span><input class="form-input" id="edit-emoji" value="'+(f.emoji||'🍽️')+'"/></div><div class="form-item"><span class="form-label">分类</span><select class="picker-value" id="edit-cat">'+o+'</select></div><div class="form-item"><span class="form-label">菜品图片</span><input type="file" id="edit-img" accept="image/*" style="display:block;margin-top:5px;"/></div><div class="modal-btns"><button class="btn-cancel" onclick="closeEdit()">取消</button><button class="btn-save" onclick="saveEdit()">保存</button></div></div></div>');
    }

    function closeEdit(){const m=document.getElementById('edit-modal');if(m)m.remove();editId=null}

    async function saveEdit(){
      const n=document.getElementById('edit-name').value.trim(),p=parseFloat(document.getElementById('edit-price').value)||0,e=document.getElementById('edit-emoji').value.trim()||'🍽️',c=parseInt(document.getElementById('edit-cat').value);
      if(!n){Toast.show('请输入名称');return}
      const imgFile=document.getElementById('edit-img').files[0];
      let imgUrl='';
      if(imgFile){imgUrl=await uploadImage(imgFile);if(!imgUrl){Toast.show('图片上传失败，请用英文文件名');return}}
      const body={name:n,price:p,emoji:e,category_index:c};if(imgUrl)body.image_url=imgUrl;
      try{await api('foods?id=eq.'+editId,{method:'PATCH',body});Toast.show('保存成功');closeEdit();await loadFoods();renderAdminFoods()}catch(err){console.error(err);Toast.show('保存失败')}
    }

    document.addEventListener('DOMContentLoaded',init);
  </script>
</body>
</html>
